<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>rec-border</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      /* L'outline est dessiné À L'EXTÉRIEUR de la boîte (region) → il tombe hors
         de la zone capturée par ffmpeg et n'apparaît donc pas dans la vidéo. */
      #box {
        position: absolute;
        box-sizing: border-box;
        outline: 3px solid #ff3b30;
        outline-offset: 0;
        border-radius: 2px;
        pointer-events: none;
        animation: rec-pulse 1.4s ease-in-out infinite;
      }
      @keyframes rec-pulse {
        0%,
        100% {
          outline-color: #ff3b30;
        }
        50% {
          outline-color: rgba(255, 59, 48, 0.35);
        }
      }
    </style>
  </head>
  <body>
    <div id="box"></div>
    <script type="module" src="hud-border.js"></script>
  </body>
</html>
