<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recording</title>
    <link rel="stylesheet" href="recorder.css" />
  </head>
  <body>
    <main>
      <div id="stage">
        <video id="player" controls></video>
        <div id="crop-box" hidden>
          <div class="handle nw"></div>
          <div class="handle ne"></div>
          <div class="handle sw"></div>
          <div class="handle se"></div>
        </div>
      </div>
      <section id="timeline">
        <div id="track">
          <div id="range"></div>
          <div id="playhead"></div>
          <div id="h-start" class="bracket" title="Trim start"><b></b></div>
          <div id="h-end" class="bracket" title="Trim end"><b></b></div>
        </div>
        <div id="time-row">
          <span id="t-start">0:00</span>
          <span id="t-dur">0:00</span>
          <span id="t-end">0:00</span>
        </div>
      </section>
      <section id="controls">
        <button id="crop-toggle">Crop</button>
        <label
          >Speed
          <select id="speed">
            <option value="1">1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </label>
        <button id="export-mp4">Save MP4…</button>
        <button id="export-gif">Save GIF…</button>
        <button id="discard">Discard</button>
        <progress id="export-progress" max="1" value="0" hidden></progress>
      </section>
    </main>
    <script type="module" src="recorder.js"></script>
  </body>
</html>
