<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recording</title>
    <link rel="stylesheet" href="recorder.css" />
  </head>
  <body>
    <main>
      <header id="topbar">
        <div>
          <h1>Recording</h1>
          <p id="status">Ready to export</p>
        </div>
        <button id="discard" class="btn ghost">Discard</button>
      </header>
      <div id="stage">
        <video id="player" controls></video>
        <div id="crop-box" hidden>
          <div class="handle nw"></div>
          <div class="handle ne"></div>
          <div class="handle sw"></div>
          <div class="handle se"></div>
        </div>
      </div>
      <section id="timeline">
        <div id="track">
          <div id="range"></div>
          <div id="playhead"></div>
          <div id="h-start" class="bracket" title="Trim start"><b></b></div>
          <div id="h-end" class="bracket" title="Trim end"><b></b></div>
        </div>
        <div id="time-row">
          <span id="t-start">0:00</span>
          <span id="t-dur">0:00</span>
          <span id="t-end">0:00</span>
        </div>
        <div id="precision-row">
          <label>
            <span>Start</span>
            <input id="trim-start" type="number" min="0" step="0.1" value="0.0" />
          </label>
          <label>
            <span>End</span>
            <input id="trim-end" type="number" min="0" step="0.1" value="0.0" />
          </label>
          <span id="crop-meta">Crop off</span>
        </div>
      </section>
      <section id="edit-panel">
        <div id="controls">
          <button id="crop-toggle" class="btn">Crop</button>
          <button id="reset-crop" class="btn subtle" disabled>Reset crop</button>
          <button id="mark-start" class="btn subtle">Start here</button>
          <button id="mark-end" class="btn subtle">End here</button>
          <button id="reset-trim" class="btn subtle" disabled>Reset trim</button>
          <label class="select-field">
            <span>Speed</span>
            <select id="speed">
              <option value="1">1×</option>
              <option value="2">2×</option>
              <option value="4">4×</option>
            </select>
          </label>
          <label class="select-field">
            <span>Preset</span>
            <select id="export-preset">
              <option value="mp4-high">MP4 high</option>
              <option value="mp4-small">MP4 small</option>
              <option value="gif-smooth">GIF smooth</option>
              <option value="gif-small">GIF small</option>
            </select>
          </label>
          <div class="spacer"></div>
          <button id="cancel-export" class="btn danger" hidden>Cancel</button>
          <button id="export-gif" class="btn">Save GIF…</button>
          <button id="export-mp4" class="btn primary">Save MP4…</button>
        </div>
        <div id="progress-row" hidden>
          <progress id="export-progress" max="1" value="0"></progress>
          <span id="export-progress-label">0%</span>
        </div>
        <div id="exports" hidden>
          <div class="exports-head">
            <span>Saved</span>
            <span id="exports-count">0</span>
          </div>
          <div id="exports-list"></div>
        </div>
      </section>
    </main>
    <div id="toasts" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="recorder.js"></script>
  </body>
</html>
