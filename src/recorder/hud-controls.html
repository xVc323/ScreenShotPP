<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recording</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: Inter, Avenir, Helvetica, Arial, sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      #bar {
        display: flex;
        align-items: center;
        gap: 10px;
        height: 100%;
        padding: 0 12px;
        box-sizing: border-box;
        background: rgba(28, 28, 30, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        color: #f0f0f0;
      }
      #dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ff3b30;
        animation: blink 1.2s steps(1) infinite;
        flex: 0 0 auto;
      }
      #dot.paused {
        animation: none;
        background: #ffcc00;
      }
      @keyframes blink {
        50% {
          opacity: 0.25;
        }
      }
      #time {
        font-variant-numeric: tabular-nums;
        font-size: 15px;
        min-width: 52px;
      }
      .spacer {
        flex: 1 1 auto;
      }
      button {
        font: inherit;
        font-size: 13px;
        color: #f0f0f0;
        background: #3a3a3c;
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        cursor: pointer;
      }
      button:hover {
        background: #4a4a4c;
      }
      #stop {
        background: #ff3b30;
      }
      #stop:hover {
        background: #ff574f;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <div id="dot"></div>
      <span id="time">0:00</span>
      <span class="spacer"></span>
      <button id="pause">Pause</button>
      <button id="stop">Stop</button>
    </div>
    <script type="module" src="hud-controls.js"></script>
  </body>
</html>
