<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenShotPP — Settings</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="settings">
      <section id="update-banner" class="update-banner" hidden>
        <div class="update-banner-head">
          <div class="update-banner-text">
            <p class="update-banner-eyebrow">Update available</p>
            <p id="update-banner-title" class="update-banner-title"></p>
          </div>
          <a id="update-changelog" class="update-changelog" href="#" role="button">Changelog ↗</a>
        </div>
        <div class="update-banner-actions">
          <button id="update-install" class="btn-primary" type="button">Install</button>
          <button id="update-later" class="btn-ghost" type="button">Later</button>
          <button id="update-skip" class="btn-ghost" type="button">Skip this version</button>
          <span id="update-banner-status" class="update-status"></span>
        </div>
      </section>

      <h1>Settings</h1>

      <label class="field">
        <span class="field-label">Capture shortcut</span>
        <button id="shortcut" class="recorder" type="button">…</button>
      </label>

      <label class="field">
        <span class="field-label">Delayed capture shortcut</span>
        <button id="delayed-shortcut" class="recorder" type="button">CmdOrCtrl+Shift+3</button>
      </label>

      <label class="field">
        <span class="field-label">Capture delay (seconds)</span>
        <input id="capture-delay" type="number" min="1" max="60" step="1" value="3" />
      </label>

      <label class="field">
        <span class="field-label">Cancel countdown shortcut</span>
        <button id="cancel-shortcut" class="recorder" type="button">Escape</button>
      </label>

      <label class="field">
        <span class="field-label">Default save folder</span>
        <span class="row">
          <span id="folder" class="path">Desktop</span>
          <button id="choose-folder" type="button">Choose…</button>
        </span>
      </label>

      <label class="field">
        <span class="field-label">Default format</span>
        <select id="format">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">OCR language</span>
        <select id="ocr-language">
          <option value="auto">Auto-detect</option>
          <option value="en-US">English</option>
          <option value="fr-FR">Français</option>
          <option value="es-ES">Español</option>
          <option value="de-DE">Deutsch</option>
        </select>
      </label>

      <label class="field">
        <span class="row">
          <input id="launch-at-login" type="checkbox" />
          <span class="field-label">Launch at login</span>
        </span>
      </label>

      <div class="field">
        <span class="row">
          <button id="check-updates" type="button">Check for updates</button>
          <span id="update-status" class="update-status"></span>
        </span>
      </div>

      <p class="version">Version <span id="version">—</span></p>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
