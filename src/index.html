<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenShotPP — Settings</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="settings">
      <section id="update-banner" class="update-banner" hidden>
        <div class="update-banner-head">
          <div class="update-banner-text">
            <p class="update-banner-eyebrow">Update available</p>
            <p id="update-banner-title" class="update-banner-title"></p>
          </div>
          <a id="update-changelog" class="update-changelog" href="#" role="button">Changelog ↗</a>
        </div>
        <div class="update-banner-actions">
          <button id="update-install" class="btn-primary" type="button">Install</button>
          <button id="update-later" class="btn-ghost" type="button">Later</button>
          <button id="update-skip" class="btn-ghost" type="button">Skip this version</button>
          <span id="update-banner-status" class="update-status"></span>
        </div>
      </section>

      <header class="settings-head">
        <h1>Settings</h1>
        <p class="version">Version <span id="version">—</span></p>
      </header>

      <section class="settings-section">
        <h2>Capture</h2>
        <div class="settings-grid">
          <label class="field">
            <span class="field-label">Capture shortcut</span>
            <button id="shortcut" class="recorder" type="button">…</button>
          </label>

          <label class="field">
            <span class="field-label">Delayed shortcut</span>
            <button id="delayed-shortcut" class="recorder" type="button">CmdOrCtrl+Shift+3</button>
          </label>

          <label class="field">
            <span class="field-label">Capture delay</span>
            <input id="capture-delay" type="number" min="1" max="60" step="1" value="3" />
          </label>

          <label class="field">
            <span class="field-label">Cancel countdown</span>
            <button id="cancel-shortcut" class="recorder" type="button">Escape</button>
          </label>
        </div>
      </section>

      <section class="settings-section">
        <h2>Recording</h2>
        <div class="settings-grid">
          <label class="field">
            <span class="field-label">Record shortcut</span>
            <button id="record-shortcut" class="recorder" type="button">CmdOrCtrl+Shift+5</button>
          </label>

          <label class="field">
            <span class="field-label">Recording delay</span>
            <input id="record-delay" type="number" min="0" max="60" step="1" value="0" />
          </label>

          <label class="field">
            <span class="field-label">Recording FPS</span>
            <select id="record-fps">
              <option value="24">24</option>
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </label>

          <label class="field checkbox-field">
            <span class="field-label">Cursor</span>
            <span class="row">
              <input id="record-cursor" type="checkbox" />
              <span>Show cursor</span>
            </span>
          </label>
        </div>
      </section>

      <section class="settings-section">
        <h2>Files</h2>
        <div class="settings-grid">
          <label class="field wide">
            <span class="field-label">Default save folder</span>
            <span class="row">
              <span id="folder" class="path">Desktop</span>
              <button id="choose-folder" type="button">Choose…</button>
            </span>
          </label>

          <label class="field">
            <span class="field-label">Default format</span>
            <select id="format">
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">OCR language</span>
            <select id="ocr-language">
              <option value="auto">Auto-detect</option>
              <option value="en-US">English</option>
              <option value="fr-FR">Français</option>
              <option value="es-ES">Español</option>
              <option value="de-DE">Deutsch</option>
            </select>
          </label>
        </div>
      </section>

      <section class="settings-section">
        <h2>App</h2>
        <div class="settings-grid">
          <label class="field checkbox-field">
            <span class="field-label">Startup</span>
            <span class="row">
              <input id="launch-at-login" type="checkbox" />
              <span>Launch at login</span>
            </span>
          </label>

          <div class="field update-field">
            <span class="field-label">Updates</span>
            <span class="row">
              <button id="check-updates" type="button">Check</button>
              <span id="update-status" class="update-status"></span>
            </span>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
