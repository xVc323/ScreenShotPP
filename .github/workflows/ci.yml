name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cargo tests (logique pure)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: Cargo tests core (logique pure)
        run: cargo test --manifest-path src-tauri/Cargo.toml -p screenshotpp-core
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Tests frontend (logique pure)
        run: node --test src/accelerator.test.js src/editable-target.test.js src/editor/history.test.js src/editor/color.test.js src/editor/bubbles.test.js src/editor/editor.test.js src/editor/mosaic.test.js
      - name: Release storefront readiness
        shell: bash
        run: scripts/check-release-readiness.sh
