name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Import Developer ID Application certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain |
            sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' |
            head -1)
          test -n "$CERT_ID"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
      - name: Prepare App Store Connect API key
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
      - name: Build signed and notarized app + DMG
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles app,dmg --target aarch64-apple-darwin
      - name: Notarize and staple the DMG
        run: |
          dmg=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          # Tauri notarizes and staples the .app but not the .dmg wrapper, then deletes
          # the .app. Notarize the signed DMG itself so the ticket can be stapled to it.
          xcrun notarytool submit "$dmg" \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" \
            --wait
          xcrun stapler staple "$dmg"
      - name: Validate stapled DMG
        run: xcrun stapler validate src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build Windows NSIS preview installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles nsis
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Flatten downloaded assets
        shell: bash
        run: |
          # upload-artifact preserves the macOS bundle/{dmg,macos} subdirs;
          # flatten so the globs below and gh release create see plain files.
          find release-assets -mindepth 2 -type f -exec mv -t release-assets/ {} +
          find release-assets -mindepth 1 -type d -empty -delete
          ls -la release-assets
      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mac_archive=$(basename "$(ls release-assets/*.app.tar.gz)")
          win_setup=$(basename "$(ls release-assets/*-setup.exe)")
          test -s "release-assets/${mac_archive}.sig"
          test -s "release-assets/${win_setup}.sig"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          jq -n \
            --arg version "$version" \
            --arg notes "$(node scripts/updater-notes.mjs ".github/release-notes/${GITHUB_REF_NAME}.md")" \
            --arg macsig "$(cat "release-assets/${mac_archive}.sig")" \
            --arg macurl "${base}/${mac_archive}" \
            --arg winsig "$(cat "release-assets/${win_setup}.sig")" \
            --arg winurl "${base}/${win_setup}" \
            '{
              version: $version,
              notes: $notes,
              platforms: {
                "darwin-aarch64": { signature: $macsig, url: $macurl },
                "windows-x86_64": { signature: $winsig, url: $winurl }
              }
            }' > release-assets/latest.json
      - name: Publish complete GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          test -f "$notes"
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            release-assets/* \
            --verify-tag \
            --title "ScreenShotPP ${GITHUB_REF_NAME}" \
            --notes-file "$notes" \
            "${prerelease[@]}"
