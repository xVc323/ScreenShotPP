name: Feature request
description: Suggest an improvement or new workflow for ScreenShotPP
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the workflow problem before the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to do, and what is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ScreenShotPP to do?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Both macOS and Windows
        - Not platform-specific
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Capture
        - Annotation editor
        - OCR
        - Clipboard or export
        - Shortcuts and settings
        - Packaging or installation
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or other approaches we should consider?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, examples, or links if useful.
    validations:
      required: false
