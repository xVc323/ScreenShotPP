name: Bug report
description: Report a reproducible problem in ScreenShotPP
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include sensitive screenshots, documents, tokens, or personal information.
  - type: input
    id: version
    attributes:
      label: ScreenShotPP version
      description: Use the release version or commit SHA if you built from source.
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 15.5, Windows 11 24H2, etc."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Open ScreenShotPP
        2. Press the capture shortcut
        3. Select a region
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recordings, or logs
      description: Add supporting material if it helps. Remove private information first.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help us understand the problem.
    validations:
      required: false
